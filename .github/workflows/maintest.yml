on:
  push:
    branches:
      - main
      - consensus_2_main
      - consensus_2_preview
  pull_request:
    branches:
      - main
      - consensus_2_main
      - consensus_2_preview

name: MainTest
jobs:
  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: ApiTest
        run: make test-api
      - name: MainTest
        run: make test-main
